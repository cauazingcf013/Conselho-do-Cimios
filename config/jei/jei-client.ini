[appearance]
	# Nome: Centralizar barra de busca
	# Descrição: Move a barra de busca do JEI para o centro inferior da tela.
	# Valores válidos: [true, false]
	# Valor padrão: false
	centerSearch = false

	# Nome: Altura máxima da interface de receitas
	# Descrição: Altura máxima da interface de receitas (em pixels).
	# Valores válidos: Any integer greater than or equal to 175
	# Valor padrão: 350
	recipeGuiHeight = 350


[cheating]
	# Nome: Modo de entrega
	# Descrição: Escolher se o JEI entrega itens direto no inventário ou pega com o mouse.
	# Valores válidos: [INVENTORY, MOUSE_PICKUP]
	# Valor padrão: MOUSE_PICKUP
	giveMode = MOUSE_PICKUP

	# Nome: Trapaça na barra rápida com teclas
	# Descrição: Permite trapacear itens na barra rápida usando Shift + teclas numéricas.
	# Valores válidos: [true, false]
	# Valor padrão: false
	cheatToHotbarUsingHotkeysEnabled = false

	# Nome: Mostrar ingredientes ocultos
	# Descrição: Exibe ingredientes que não aparecem no menu criativo.
	# Valores válidos: [true, false]
	# Valor padrão: false
	showHiddenIngredients = false

	# Nome: Mostrar receitas de tags
	# Descrição: Mostra receitas para tags de itens e blocos.
	# Valores válidos: [true, false]
	# Valor padrão: false
	showTagRecipesEnabled = false


[bookmarks]
	# Nome: Adicionar favoritos no início
	# Descrição: Se verdadeiro, novos favoritos vão para o início da lista. Se falso, vão para o final.
	# Valores válidos: [true, false]
	# Valor padrão: false
	addBookmarksToFrontEnabled = false

	# Nome: Arrastar para reorganizar favoritos
	# Descrição: Permite arrastar favoritos para mudar a ordem na lista.
	# Valores válidos: [true, false]
	# Valor padrão: true
	dragToRearrangeBookmarksEnabled = true


[tooltips]
	# Nome: Recursos das dicas de favoritos
	# Descrição: Recursos extras para dicas de favoritos.
	# Valores válidos: A comma-separated list containing values of:
	# [PREVIEW, INGREDIENTS]
	# Valor padrão: PREVIEW
	bookmarkTooltipFeatures = PREVIEW

	# Nome: Shift para dicas de favoritos
	# Descrição: Segure Shift para ver recursos das dicas de favoritos.
	# Valores válidos: [true, false]
	# Valor padrão: true
	holdShiftToShowBookmarkTooltipFeatures = true

	# Nome: Mostrar nomes de abas criativas
	# Descrição: Mostra nomes das abas criativas nas dicas de ingredientes.
	# Valores válidos: [true, false]
	# Valor padrão: false
	showCreativeTabNamesEnabled = false

	# Nome: Mostrar conteúdo das tags
	# Descrição: Mostra conteúdo das tags nas dicas ao navegar por ingredientes de receitas.
	# Valores válidos: [true, false]
	# Valor padrão: true
	tagContentTooltipEnabled = true

	# Nome: Ocultar conteúdo de tag com um único ingrediente
	# Descrição: Oculta conteúdo da tag nas dicas quando há apenas um ingrediente na tag.
	# Valores válidos: [true, false]
	# Valor padrão: true
	hideSingleTagContentTooltipEnabled = true

	# Nome: Resumo de ingredientes da receita
	# Descrição: Mostra resumo dos ingredientes necessários na dica do item de saída da receita.
	# Valores válidos: [true, false]
	# Valor padrão: false
	enableRecipesGuiIngredientsSummary = false


[performance]
	# Nome: Busca em modo baixo consumo
	# Descrição: Define a busca para modo de baixa memória (mais lenta, mas usa menos RAM).
	# Valores válidos: [true, false]
	# Valor padrão: false
	lowMemorySlowSearchEnabled = false


[lookups]
	# Nome: Buscar conteúdo de fluidos
	# Descrição: Ao buscar receitas de itens com fluidos, também busca receitas dos fluidos.
	# Valores válidos: [true, false]
	# Valor padrão: false
	lookupFluidContentsEnabled = false

	# Nome: Buscar tags de blocos de itens
	# Descrição: Ao buscar tags de itens, inclui também tags dos blocos padrão contidos nos itens.
	# Valores válidos: [true, false]
	# Valor padrão: true
	lookupBlockTagsEnabled = true


[lookupHistory]
	# Nome: Ativado
	# Descrição: Exibe ou oculta a sobreposição de histórico de buscas.
	# Valores válidos: [true, false]
	# Valor padrão: false
	enabled = false

	# Nome: Máximo de linhas
	# Descrição: Número máximo de linhas exibidas no histórico.
	# Valores válidos: An integer in the range [1, 7] (inclusive)
	# Valor padrão: 2
	maxRows = 2

	# Nome: Máximo de ingredientes
	# Descrição: Número máximo de ingredientes salvos no histórico.
	# Valores válidos: An integer in the range [10, 1000] (inclusive)
	# Valor padrão: 100
	maxIngredients = 100

	# Nome: Lado da tela
	# Descrição: Lado da tela para exibir a sobreposição de histórico.
	# Valores válidos: [LEFT, RIGHT]
	# Valor padrão: LEFT
	displaySide = LEFT


[advanced]
	# Nome: Capturar erros de renderização
	# Descrição: Captura erros de renderização de ingredientes modificados e tenta recuperar em vez de travar.
	# Valores válidos: [true, false]
	# Valor padrão: true
	catchRenderErrorsEnabled = true


[input]
	# Nome: Atraso de arrasto
	# Descrição: Milissegundos antes de um clique longo ser considerado arrasto.
	# Valores válidos: An integer in the range [0, 1000] (inclusive)
	# Valor padrão: 150
	dragDelayInMilliseconds = 150

	# Nome: Velocidade de rolagem suave
	# Descrição: Velocidade de rolagem com a roda do mouse em caixas suaves (em pixels).
	# Valores válidos: An integer in the range [1, 50] (inclusive)
	# Valor padrão: 9
	smoothScrollRate = 9


[sorting]
	# Nome: Etapas de ordenação de ingredientes
	# Descrição: Ordem de classificação da lista de ingredientes.
	# Valores válidos: A comma-separated list containing values of:
	# [MOD_NAME, INGREDIENT_TYPE, ALPHABETICAL, CREATIVE_MENU, TAG, ARMOR, MAX_DURABILITY]
	# Valor padrão: MOD_NAME, INGREDIENT_TYPE, CREATIVE_MENU
	ingredientSortStages = MOD_NAME, INGREDIENT_TYPE, CREATIVE_MENU

	# Nome: Etapas de ordenação de receitas
	# Descrição: Ordem de classificação das receitas exibidas.
	# Valores válidos: A comma-separated list containing values of:
	# [BOOKMARKED, CRAFTABLE]
	# Valor padrão: BOOKMARKED, CRAFTABLE
	recipeSorterStages = BOOKMARKED, CRAFTABLE


[search]
	# Nome: Modo de busca por nome do mod (@)
	# Descrição: Modo de busca para nomes de mods (prefixo: @).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: REQUIRE_PREFIX
	modNameSearchMode = REQUIRE_PREFIX

	# Nome: Modo de busca por tag (#)
	# Descrição: Modo de busca para tags (prefixo: #).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: REQUIRE_PREFIX
	tagSearchMode = REQUIRE_PREFIX

	# Nome: Modo de busca por dica ($)
	# Descrição: Modo de busca para dicas de ferramentas (prefixo: $).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: ENABLED
	tooltipSearchMode = ENABLED

	# Nome: Modo de busca por cor (^)
	# Descrição: Modo de busca para cores (prefixo: ^).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: DISABLED
	colorSearchMode = DISABLED

	# Nome: Modo de busca por identificador (&)
	# Descrição: Modo de busca para IDs de recursos (prefixo: &).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: DISABLED
	identifierSearchMode = DISABLED

	# Nome: Modo de busca por aba criativa (%)
	# Descrição: Modo de busca para nomes de abas criativas (prefixo: %).
	# Valores válidos: [ENABLED, REQUIRE_PREFIX, DISABLED]
	# Valor padrão: DISABLED
	creativeTabSearchMode = DISABLED

	# Nome: Buscar em dicas avançadas
	# Descrição: Busca em dicas avançadas (visíveis com F3 + H).
	# Valores válidos: [true, false]
	# Valor padrão: false
	searchAdvancedTooltips = false

	# Nome: Buscar IDs de mods
	# Descrição: Busca IDs de mods além dos nomes.
	# Valores válidos: [true, false]
	# Valor padrão: true
	searchModIds = true

	# Nome: Buscar sinônimos de mods
	# Descrição: Busca nomes alternativos de mods adicionados por plugins.
	# Valores válidos: [true, false]
	# Valor padrão: true
	searchModAliases = true

	# Nome: Buscar nomes curtos de mods
	# Descrição: Busca pelas iniciais do nome do mod.
	# Valores válidos: [true, false]
	# Valor padrão: false
	searchShortModNames = false

	# Nome: Buscar sinônimos de ingredientes
	# Descrição: Busca nomes alternativos de ingredientes adicionados por plugins.
	# Valores válidos: [true, false]
	# Valor padrão: true
	searchIngredientAliases = true


[ingredientList]
	# Nome: Máximo de linhas
	# Descrição: Número máximo de linhas exibidas.
	# Valores válidos: An integer in the range [1, 100] (inclusive)
	# Valor padrão: 16
	maxRows = 16

	# Nome: Máximo de colunas
	# Descrição: Número máximo de colunas exibidas.
	# Valores válidos: An integer in the range [2, 100] (inclusive)
	# Valor padrão: 9
	maxColumns = 9

	# Nome: Alinhamento horizontal
	# Descrição: Alinhamento horizontal da lista na área disponível.
	# Valores válidos: [LEFT, CENTER, RIGHT]
	# Valor padrão: RIGHT
	horizontalAlignment = RIGHT

	# Nome: Alinhamento vertical
	# Descrição: Alinhamento vertical da lista na área disponível.
	# Valores válidos: [TOP, CENTER, BOTTOM]
	# Valor padrão: TOP
	verticalAlignment = TOP

	# Nome: Visibilidade de navegação
	# Descrição: Visibilidade dos botões de página superior. AUTO_HIDE mostra só quando há várias páginas.
	# Valores válidos: [ENABLED, AUTO_HIDE, DISABLED]
	# Valor padrão: ENABLED
	buttonNavigationVisibility = ENABLED

	# Nome: Desenhar fundo da GUI
	# Descrição: Ative para desenhar textura de fundo atrás da lista de ingredientes.
	# Valores válidos: [true, false]
	# Valor padrão: false
	drawBackground = false


[bookmarkList]
	# Nome: Máximo de linhas
	# Descrição: Número máximo de linhas exibidas.
	# Valores válidos: An integer in the range [1, 100] (inclusive)
	# Valor padrão: 16
	maxRows = 16

	# Nome: Máximo de colunas
	# Descrição: Número máximo de colunas exibidas.
	# Valores válidos: An integer in the range [2, 100] (inclusive)
	# Valor padrão: 9
	maxColumns = 9

	# Nome: Alinhamento horizontal
	# Descrição: Alinhamento horizontal da lista na área disponível.
	# Valores válidos: [LEFT, CENTER, RIGHT]
	# Valor padrão: LEFT
	horizontalAlignment = LEFT

	# Nome: Alinhamento vertical
	# Descrição: Alinhamento vertical da lista na área disponível.
	# Valores válidos: [TOP, CENTER, BOTTOM]
	# Valor padrão: TOP
	verticalAlignment = TOP

	# Nome: Visibilidade de navegação
	# Descrição: Visibilidade dos botões de página superior. AUTO_HIDE mostra só quando há várias páginas.
	# Valores válidos: [ENABLED, AUTO_HIDE, DISABLED]
	# Valor padrão: ENABLED
	buttonNavigationVisibility = ENABLED

	# Nome: Desenhar fundo da GUI
	# Descrição: Ative para desenhar textura de fundo atrás da lista de favoritos.
	# Valores válidos: [true, false]
	# Valor padrão: false
	drawBackground = false


